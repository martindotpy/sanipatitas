services:
  # Reverse proxy
  reverse-proxy:
    image: haproxy:3.1-alpine
    container_name: sanipatitas-proxy
    ports:
      - "80:80"
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      service-auth:
        condition: service_healthy
      service-ehr:
        condition: service_healthy
      service-inventory:
        condition: service_healthy
      service-payment:
        condition: service_healthy
      service-appointment:
        condition: service_healthy
      service-patient:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --spider --timeout=5 http://127.0.0.1:80/api/auth/ok || wget
          --spider --timeout=5 http://127.0.0.1:80/api/patient/_health"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Services
  # - Auth
  service-auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      LOKI_ENABLED: "false"
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgres://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      BETTER_AUTH_SECRET: dev-secret-key-not-for-production-please-change-in-prod
      BETTER_AUTH_URL: http://localhost
      ADMIN_EMAIL: dev@martindotpy.dev
      ADMIN_PASSWORD: martindotpy
      REDIS_URL: redis://database-redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-re_dnB6BH1q_KPYyVSfL2kCVaQfhisSoqTGa}
      EMAIL_FROM: "Sanipatitas <onboarding@resend.dev>"
    container_name: sanipatitas-auth
    expose:
      - "3000"
    ports:
      - "3000:3000"
    depends_on:
      database-sql:
        condition: service_healthy
      database-redis:
        condition: service_healthy

  # - Patient (Native)
  service-patient:
    build:
      context: .
      dockerfile: services/patient/Dockerfile.native
    container_name: sanipatitas-patient
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://service-auth:3000/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
    expose:
      - "8080"
    ports:
      - "8080:8080"
    depends_on:
      service-auth:
        condition: service_healthy

  # - EHR (Native)
  service-ehr:
    build:
      context: .
      dockerfile: services/ehr/Dockerfile.native
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://service-auth:3000/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
    container_name: sanipatitas-ehr
    expose:
      - "8082"
    ports:
      - "8082:8082"
    depends_on:
      service-auth:
        condition: service_healthy

  # - Inventory (Native)
  service-inventory:
    build:
      context: .
      dockerfile: services/inventory/Dockerfile.native
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://service-auth:3000/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
    container_name: sanipatitas-inventory
    expose:
      - "8083"
    ports:
      - "8083:8083"
    depends_on:
      service-auth:
        condition: service_healthy

  # - Payment (Native)
  service-payment:
    build:
      context: .
      dockerfile: services/payment/Dockerfile.native
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://service-auth:3000/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
    container_name: sanipatitas-payment
    expose:
      - "8084"
    ports:
      - "8084:8084"
    depends_on:
      service-auth:
        condition: service_healthy

  # - Appointment (Native)
  service-appointment:
    build:
      context: .
      dockerfile: services/appointment/Dockerfile.native
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://service-auth:3000/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
    container_name: sanipatitas-appointment
    expose:
      - "8081"
    ports:
      - "8081:8081"
    depends_on:
      service-auth:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: apps/desktop/Dockerfile
      args:
        - PUBLIC_BASE_URL=http://localhost
    container_name: sanipatitas-frontend
    environment:
      - PUBLIC_BASE_URL=http://localhost
    expose:
      - "80"
    ports:
      - "1420:80"

  # Databases
  # - SQL
  database-sql:
    image: postgres:17-alpine
    container_name: sanipatitas-db
    environment:
      TZ: America/Lima
      POSTGRES_USER: sanipatitas-user
      POSTGRES_PASSWORD: sanipatitas-password
      POSTGRES_DB: sanipatitas-db
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10

  # - Redis
  database-redis:
    image: redis:7-alpine
    container_name: sanipatitas-redis
    environment:
      TZ: America/Lima
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD-SHELL
        - "redis-cli ping"
      interval: 5s
      timeout: 5s
      retries: 10

volumes: {}
