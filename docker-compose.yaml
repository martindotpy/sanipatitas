services:
  # Reverse proxy
  reverse-proxy:
    image: haproxy:3.1-alpine
    container_name: sanipatitas-proxy
    ports:
      - "80:80"
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      service-auth:
        condition: service_healthy
      service-ehr:
        condition: service_healthy
      service-appointment:
        condition: service_healthy
      service-patient:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --spider --timeout=5 http://localhost:80/api/auth/ok || wget --spider --timeout=5 http://localhost:80/api/patient/_health"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Services
  # - Auth
  service-auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file: services/auth/.env
    environment:
      LOKI_ENABLED: "true"
      LOKI_URL: http://observability-loki:3100
      SERVICE_NAME: auth
    container_name: sanipatitas-auth
    expose:
      - "3000"
    ports:
      - "3000:3000"
    depends_on:
      database-sql:
        condition: service_healthy
      database-redis:
        condition: service_healthy
  # - Patient
  service-patient:
    build:
      context: .
      dockerfile: services/patient/Dockerfile
    container_name: sanipatitas-patient
    env_file: services/patient/.env
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://host.docker.internal/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
      - LOKI_ENABLED=true
      - LOKI_URL=http://observability-loki:3100
      - SERVICE_NAME=patient
    expose:
      - "8080"
    ports:
      - "8080:8080"
    depends_on:
      service-auth:
        condition: service_healthy


  # - EHR
  service-ehr:
    build:
      context: .
      dockerfile: services/ehr/Dockerfile
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://host.docker.internal/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
      - LOKI_ENABLED=true
      - LOKI_URL=http://observability-loki:3100
      - SERVICE_NAME=ehr
    container_name: sanipatitas-ehr
    env_file: services/ehr/.env
    expose:
      - "8082"
    ports:
      - "8082:8082"
    depends_on:
      service-auth:
        condition: service_healthy

  # - Appointment
  service-appointment:
    build:
      context: .
      dockerfile: services/appointment/Dockerfile
    environment:
      - QUARKUS_DATASOURCE_REACTIVE_URL=vertx-reactive:postgresql://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://database-sql:5432/sanipatitas-db
      - QUARKUS_DATASOURCE_USERNAME=sanipatitas-user
      - QUARKUS_DATASOURCE_PASSWORD=sanipatitas-password
      - QUARKUS_REDIS_HOSTS=redis://database-redis:6379
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=http://host.docker.internal/api/auth/jwks
      - MP_JWT_VERIFY_ISSUER=http://localhost
      - MP_JWT_VERIFY_AUDIENCES=http://localhost
      - LOKI_ENABLED=true
      - LOKI_URL=http://observability-loki:3100
      - SERVICE_NAME=appointment
    container_name: sanipatitas-appointment
    env_file: services/appointment/.env
    expose:
      - "8081"
    ports:
      - "8081:8081"
    depends_on:
      service-auth:
        condition: service_healthy


  # Frontend
  frontend:
    build:
      context: .
      dockerfile: apps/desktop/Dockerfile
    container_name: sanipatitas-frontend
    environment:
      - PUBLIC_BASE_URL=http://localhost
    expose:
      - "80"
    ports:
      - "1420:80"


  # Databases
  # - SQL
  database-sql:
    image: postgres:17-alpine
    container_name: sanipatitas-db
    environment:
      TZ: America/Lima
      POSTGRES_USER: sanipatitas-user
      POSTGRES_PASSWORD: sanipatitas-password
      POSTGRES_DB: sanipatitas-db
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10

  # - SQL Studio
  database-sql-studio:
    image: ghcr.io/drizzle-team/gateway:latest
    container_name: sanipatitas-db-studio
    environment:
      TZ: America/Lima
      DATABASE_URL_APP: postgres://sanipatitas-user:sanipatitas-password@database-sql:5432/sanipatitas-db
      STORE_PATH: /data
    volumes:
      - sanipatitas-sql-studio-data:/data
    ports:
      - "4983:4983"

  # - Redis
  database-redis:
    image: redis:7-alpine
    container_name: sanipatitas-redis
    environment:
      TZ: America/Lima
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD-SHELL
        - "redis-cli ping"
      interval: 5s
      timeout: 5s
      retries: 10

  # - Redis Studio
  database-redis-studio:
    image: redis/redisinsight:latest
    container_name: sanipatitas-redis-studio
    environment:
      TZ: America/Lima
      RI_REDIS_HOST_APP: database-redis
    ports:
      - "5540:5540"

  # Observability
  # - Loki (log aggregation)
  observability-loki:
    image: grafana/loki:latest
    container_name: sanipatitas-loki
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - sanipatitas-loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # - Grafana (log visualization)
  observability-grafana:
    image: grafana/grafana:latest
    container_name: sanipatitas-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_PATHS_PROVISIONING: /var/lib/grafana/provisioning
    volumes:
      - sanipatitas-grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/var/lib/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - observability-loki

volumes:
  sanipatitas-sql-studio-data:
  sanipatitas-loki-data:
  sanipatitas-grafana-data:
