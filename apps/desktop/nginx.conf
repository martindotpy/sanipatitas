load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Remove Nginx info
  server_tokens off;

  # Basic Settings
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # IP Settings
  set_real_ip_from 0.0.0.0/0; # Only if the app is behind a tunnel, otherwise set the range of your trusted proxies
  real_ip_header X-Real-IP;

  # Precompressed Settings
  gzip_static on;
  brotli_static on;

  # Map remote address and User-Agent to decide logging for health endpoint only
  # Only skip logging when BOTH remote_addr is 127.0.0.1 AND User-Agent contains 'Wget'
  map "$remote_addr:$http_user_agent" $loggable {
    default 1;
    ~*^127\.0\.0\.1:.*Wget 0;
  }

  server {
    listen 80;
    listen [::]:80;

    root /usr/share/nginx/html;
    index index.html;
    server_name _;

    # Remove index.html
    rewrite ^/(.+)\.html$ /$1 permanent;
    rewrite ^(.+)/index.html$ $1 permanent;

    # Main location
    location / {
      try_files $uri $uri/index.html _shell/index.html =404;
    }

    # Health probe - respond OK without hitting app
    location = /_health {
      # Conditionally log /_health: omit when User-Agent contains 'Wget'
      access_log /var/log/nginx/access.log combined if=$loggable;

      add_header Content-Type "text/plain" always;
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

      return 200 'OK';
    }

    # Astro hashed assets
    location ^~ /_astro/ {
      access_log off;

      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
