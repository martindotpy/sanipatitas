global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  option dontlognull
  timeout connect 5000
  timeout client 50000
  timeout server 50000

frontend http_front
  bind *:80

  acl is-api-auth path_beg /api/auth
  acl is-api-patient path_beg /api/patient
  acl is-api-appointment path_beg /api/appointment
  acl is-api-species path_beg /api/species
  acl is-api-breed path_beg /api/breed
  acl is-api-client path_beg /api/client

  use_backend auth-backend if is-api-auth
  use_backend patient-backend if is-api-patient || is-api-species || is-api-breed || is-api-client
  use_backend appointment-backend if is-api-appointment

  default_backend frontend-backend

backend auth-backend
  server auth host.docker.internal:3000 check inter 10s fall 3 rise 2

backend patient-backend
  server patient host.docker.internal:8080 check inter 10s fall 3 rise 2

backend appointment-backend
  server appointment host.docker.internal:8081 check inter 10s fall 3 rise 2

backend frontend-backend
  server frontend host.docker.internal:1420 check inter 10s fall 3 rise 2
